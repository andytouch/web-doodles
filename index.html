<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Doodles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: monospace;
      padding: 60px 40px;
    }
    h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 40px;
    }
    ul {
      list-style: none;
    }
    li {
      margin-bottom: 16px;
    }
    a {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      transition: color 0.15s;
    }
    a:hover {
      color: #FF9B1E;
    }
  </style>
</head>
<body>
  <h1>Web Doodles — Andy</h1>
  <ul>
    <li><a href="solar-tunnel/">Solar Tunnel</a></li>
  </ul>
</body>
</html>
